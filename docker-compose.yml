services:
  api:
    build:
      context: .
      network: host
    container_name: vpinplay_api
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB_NAME=vpinplay_db
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - vpinplay_network

  mongo:
    image: mongo:7.0
    container_name: vpinplay_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=vpinplay_db
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet mongodb://localhost:27017/admin --eval \"quit(db.runCommand({ ping: 1 }).ok ? 0 : 1)\""]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s
    networks:
      - vpinplay_network

volumes:
  mongo_data:

networks:
  vpinplay_network:
    driver: bridge
