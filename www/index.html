<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPin Play Global Dashboard</title>
    <link rel="icon" type="image/png" href="img/logo.png" />
    <link rel="apple-touch-icon" href="img/logo.png" />
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/index.css" />
    <script src="js/main.js"></script>
    <script src="components/vpinplay-header.js"></script>
    <script src="components/tables-data-table.js"></script>
    <script src="components/tables-carousel.js"></script>
  </head>
  <body>
    <vpinplay-header></vpinplay-header>
    <div class="main">
      <section class="grid-kpi">
        <div class="kpi">
          <div id="kpiLastSync" class="label">Last Sync</div>
          <div id="kpiLastSyncUser" class="value">N/A</div>
        </div>
        <div class="kpi">
          <div class="label">Total Registered Users</div>
          <div id="kpiUserCount" class="value">-</div>
        </div>
        <div class="kpi">
          <div class="label">Unique VPS Games / Total Variations</div>
          <div id="kpiTotalTables" class="value">-</div>
        </div>
        <div class="kpi">
          <div id="kpiVpsdbMeta" class="label">VPSDB Sync</div>
          <div id="kpiVpsdbStatus" class="value">-</div>
        </div>
      </section>

      <tables-carousel
        title="Top Rated"
        sortBy="avgRating"
        sortOrder="-1"
        shelfStat="avgRating"
        api-url="/api/v1/tables-plus/search"
      ></tables-carousel>

      <tables-carousel
        title="Most Time Played"
        sortBy="runTimeTotal"
        sortOrder="-1"
        shelfStat="runTimeTotal"
        api-url="/api/v1/tables-plus/search"
      ></tables-carousel>

      <tables-carousel
        title="Recently Played"
        sortBy="lastRun"
        sortOrder="-1"
        shelfStat="lastRun"
        api-url="/api/v1/tables-plus/search"
      ></tables-carousel>

      <tables-carousel
        title="Most Installed"
        sortBy="playerCount"
        sortOrder="-1"
        shelfStat="playerCount"
        api-url="/api/v1/tables-plus/search"
      ></tables-carousel>

      <tables-carousel
        title="Most Plays"
        sortBy="startCountTotal"
        sortOrder="-1"
        shelfStat="startCountTotal"
        api-url="/api/v1/tables-plus/search"
      ></tables-carousel>

      <tables-carousel
        title="Newest Tables"
        sortBy="firstSeenAt"
        sortOrder="-1"
        shelfStat="firstSeenAt"
        api-url="/api/v1/tables-plus/search"
      ></tables-carousel>

      <tables-carousel
        title="Most Rated"
        sortBy="ratingCount"
        sortOrder="-1"
        shelfStat="ratingCount"
        api-url="/api/v1/tables-plus/search"
      ></tables-carousel>
    </div>
    <script src="js/index.js"></script>
  </body>
</html>
