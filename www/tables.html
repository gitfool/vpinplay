<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPin Play Tables Dashboard</title>
    <link rel="icon" type="image/png" href="img/logo.png" />
    <link rel="apple-touch-icon" href="img/logo.png" />
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/tables.css" />
    <script src="js/main.js"></script>
    <script src="components/vpinplay-header.js"></script>
    <script src="components/table-details-panel.js"></script>
    <script src="components/table-scores-panel.js"></script>
    <script src="components/tables-carousel.js"></script>
    <script src="components/tables-data-table.js"></script>
    <script src="components/table-metadata.js"></script>
    <script src="components/player-ratings.js"></script>
    <script src="components/player-runtimes.js"></script>
  </head>
  <body>
    <vpinplay-header></vpinplay-header>
    <section class="main">
      <tables-data-table
        api-url="/api/v1/tables-plus/search"
        columns-order="name, manufacturer, year, authors, avgRating, ratingCount, playerCount, startCountTotal, runTimeTotal, firstSeenAt"
        class="panel panel-full"
      ></tables-data-table>

      <section class="grid-panels">
        <table-details-panel class="panel panel-full"></table-details-panel>
        <table-scores-panel class="panel panel-full"></table-scores-panel>

        <player-ratings class="panel"></player-ratings>
        <player-runtimes class="panel" limit="10"></player-runtimes>

        <tables-metadata class="panel panel-full"></tables-metadata>
      </section>

      <tables-carousel
        title="A to Z"
        sortBy="name"
        sortOrder="1"
        shelfStat="name"
        api-url="/api/v1/tables-plus/search"
      ></tables-carousel>

      <tables-carousel
        title="By Year"
        sortBy="year"
        sortOrder="-1"
        shelfStat="year"
        api-url="/api/v1/tables-plus/search"
      ></tables-carousel>
    </section>
    <script src="js/tables.js"></script>
  </body>
</html>
